<!DOCTYPE html>
<html>
<head>
    <title>Мои заметки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: var(--tg-theme-text-color, #000);
        }
        .category {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Мои заметки</h1>
        <div id="categories"></div>
        <button onclick="addCategory()" style="
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            margin-top: 20px;
        ">➕ Добавить предмет</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let categories = [];

        function render() {
            const container = document.getElementById('categories');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'category';
                div.innerHTML = `
                    <strong>${cat.name}</strong>
                    <div style="margin-top: 10px;">
                        ${cat.tasks.map(t => `
                            <div style="padding: 5px 0;">
                                <input type="checkbox" ${t.done ? 'checked' : ''} 
                                       onchange="toggleTask(${cat.id}, ${t.id})">
                                <span style="text-decoration: ${t.done ? 'line-through' : 'none'}">
                                    ${t.name}
                                </span>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addTask(${cat.id})" style="margin-top: 10px;">+ Добавить лабу</button>
                `;
                container.appendChild(div);
            });
            
            // Сохраняем в Telegram Cloud Storage
            tg.CloudStorage.setItem('notes', JSON.stringify(categories));
        }

        window.onload = () => {
            // Загружаем сохраненные данные
            tg.CloudStorage.getItem('notes', (err, data) => {
                if (data) categories = JSON.parse(data);
                render();
            });
        };

        function addCategory() {
            const name = prompt('Название предмета:');
            if (name) {
                categories.push({
                    id: Date.now(),
                    name: name,
                    tasks: []
                });
                render();
            }
        }

        function addTask(categoryId) {
            const name = prompt('Название лабы:');
            if (name) {
                const cat = categories.find(c => c.id === categoryId);
                cat.tasks.push({
                    id: Date.now(),
                    name: name,
                    done: false
                });
                render();
            }
        }

        function toggleTask(categoryId, taskId) {
            const cat = categories.find(c => c.id === categoryId);
            const task = cat.tasks.find(t => t.id === taskId);
            task.done = !task.done;
            render();
        }
    </script>
</body>
</html>
